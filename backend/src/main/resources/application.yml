spring:
  config:
    import: optional:application-local.yml
  application:
    name: neustudy-admin-backend
  servlet:
    multipart:
      max-file-size: ${APP_MAX_FILE_SIZE:100MB}
  web:
    resources:
      static-locations: classpath:/static/,file:${APP_UPLOAD_DIR:uploads/}
  devtools:
    restart:
      enabled: ${SPRING_DEVTOOLS_RESTART_ENABLED:false}
      additional-paths: src/main/java
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/neustudy-admin?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:true}
      mail.smtp.ssl.enable: ${MAIL_SMTP_SSL_ENABLE:true}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-jwt-secret}
  admin:
    username: ${APP_ADMIN_USERNAME:admin}
    password: ${APP_ADMIN_PASSWORD:change-me}
    nickname: ${APP_ADMIN_NICKNAME:Super Admin}
    email: ${APP_ADMIN_EMAIL:admin@example.com}
    phone: ${APP_ADMIN_PHONE:10000000000}

cos:
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  region: ${COS_REGION:ap-guangzhou}
  bucket: ${COS_BUCKET:}
  prefix: ${COS_PREFIX:images/}
  url-prefix: ${COS_URL_PREFIX:}

ai:
  openai:
    baseUrl: ${AI_OPENAI_BASE_URL:https://api.openai.com/v1}
    token: ${AI_OPENAI_TOKEN:change-me}
    model: ${AI_OPENAI_MODEL:gpt-4o-mini}
